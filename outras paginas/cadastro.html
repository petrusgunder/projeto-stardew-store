<div class="corpo">

    <div class="login">

        <div class="formulario">

            <h1 id="login-titulo">Criar conta</h1>

            <form action="#">

                <div class="campo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" required>
                </div>

                <div class="campo">
                    <label for="login">Login:</label>
                    <input type="tel" id="numero" required>
                </div>

                <div class="campo">
                    <label for="email">E-mail:</label>
                    <input type="text" id="email" required>
                </div>

                <div class="campo">
                    <label for="cpf">CPF:</label>
                    <input type="text" id="cpf" maxlength="11" required>
                </div>

                <div class="campo">
                    <label for="dt-nascimento">Idade:</label>
                    <input type="date" id="dt-nascimento" required>
                </div>

                <div class="campo">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" required>
                </div>

                <div class="botao">
                    <button type="submit">Registrar</button>
                </div>

            </form>

            <a id="opcoes" href="login.html">Já é cadastrado? clique aqui</a>

        </div>

    </div>

</div>
